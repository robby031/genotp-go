name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-${{ matrix.go-version }}-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -timeout=120s -coverprofile=coverage.out -covermode=atomic ./tests/

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      continue-on-error: true

  fuzz:
    name: Run Fuzz Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-fuzz-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-fuzz-

    - name: Download dependencies
      run: go mod download

    - name: Run fuzz tests (short duration)
      run: |
        # Run each fuzz test for 30 seconds in CI
        go test -v -fuzz=FuzzBase32EncodeDecode -fuzztime=30s ./fuzz/ || true
        go test -v -fuzz=FuzzHOTP -fuzztime=30s ./fuzz/ || true
        go test -v -fuzz=FuzzTOTP -fuzztime=30s ./fuzz/ || true
        go test -v -fuzz=FuzzContextBinding -fuzztime=30s ./fuzz/ || true
        go test -v -fuzz=FuzzContextBuilder -fuzztime=30s ./fuzz/ || true
        go test -v -fuzz=FuzzVerifierContext -fuzztime=30s ./fuzz/ || true
        go test -v -fuzz=FuzzProvisioning -fuzztime=30s ./fuzz/ || true

    - name: Upload fuzz corpus
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: fuzz-corpus
        path: fuzz/testdata/fuzz/
        retention-days: 30

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
        args: --timeout=5m

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Run Gosec Security Scanner
      uses: securego/gosec@master
      with:
        args: '-no-fail -fmt sarif -out results.sarif ./...'
      continue-on-error: true

    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif
      continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build
      run: go build -v ./...

    - name: Verify go.mod is tidy
      run: |
        go mod tidy
        git diff --exit-code go.mod
